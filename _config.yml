# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Srijit Seal
name: Srijit Seal
position: Principal Scientist and Visiting Researcher, Uppsala University
email: srijit.seal@uu.se
description: >-
  I am a researcher in chemoinformatics and computational biology, centered on using machine learning and Cell Painting to study small-molecule bioactivity, image-based profiling, and drug discovery.
  <br>
  I am a Principal Scientist and Visiting Researcher at [Uppsala University](https://www.uu.se/en). Previously, I was Senior Scientist at [Merck US](https://www.merck.com/) and completed my postdoc at the [Broad Institute of MIT and Harvard](https://www.broadinstitute.org) where I was advised by
  [Anne Carpenter](https://www.broadinstitute.org/bios/anne-e-carpenter) and [Shantanu Singh](https://www.broadinstitute.org/bios/shantanu-singh). 
  <br>
  I obtained my PhD from the [University of Cambridge](https://www.cam.ac.uk/) where I was advised by
  [Andreas Bender](https://www.ch.cam.ac.uk/person/ab454).
  I also serve on the Board of Directors at the [American Society for Cellular and Computational Toxicology](https://www.ascctox.org/) and the Editorial Board of the [Journal of Cheminformatics](https://link.springer.com/journal/13321).
  
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://srijitseal.com" # the base hostname & protocol for your site, e.g. http://example.com
